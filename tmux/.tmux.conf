
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g default-terminal "xterm-256color"
set -g base-index 1
set -g pane-base-index 1
set -g mouse on
set -sg escape-time 0
set -g display-panes-time 2500
set -g renumber-windows on
set -sa terminal-overrides ",xterm*:Tc"

set -g @tpm_plugins '              \
  tmux-plugins/tpm                 \
  tmux-plugins/tmux-sensible       \
  tmux-plugins/tmux-yank           \
  tmux-plugins/tmux-pain-control   \
  tmux-plugins/tmux-copycat        \
  tmux-plugins/tmux-sessionist     \
  jabirali/tmux-tilish             \
  sunaku/tmux-navigate             \
  tmux-plugins/tmux-resurrect      \
  tmux-plugins/tmux-continuum      \
  sainnhe/tmux-fzf                 \
'

# Install `tpm` if needed.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'

# Plugin options.
set -g @tilish-navigate 'on'
set -g @tilish-default 'main-vertical'
set -g @tilish-dmenu 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @contimuum-restore 'on'
set -g @continuum-boot 'on'

unbind [
unbind p

#Status 
set -g status-style bg=default
set -g status-left-length 30
set -g status-left "#[bg=#81AAFF, fg=#000000] #S #[fg=#81AAFF, bg=#1D2030] "
set -g status-right ""
set -g status-position top

# use bat as a pager
bind-key -T copy-mode-vi P send-keys -X pipe-and-cancel "bat -p"

# Key bindings
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind Escape copy-mode
bind-key R source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

bind-key p paste-buffer
bind-key a "detach-client -a"
bind-key K "kill-session"

# bind-key t display-popup -E -d '#{pane_current_path}' -w 85% -h 85% python ~/Projects/tw_table.py
# prefix + t -> popup running your script at the cwd
bind-key t display-popup -E -T "Taskwarrior" -w 85% -h 85% -d "#{pane_current_path}" "#{SHELL} -lc '~/Projects/tw_table.py | less -R -S'"
# bind-key t display-popup -T "Taskwarrior" -w 85% -h 85% -d "#{pane_current_path}" \
#   "#{SHELL} -lc '~/Projects/tw_table.py; echo; echo \"(press Ctrl-D or type exit to close)\"; exec $SHELL -i'"

bind-key r display-popup -E -d '#{pane_current_path}' -w 85% -h 85% ranger
bind-key g display-popup -E -d '#{pane_current_path}' -w 85% -h 85% lazygit

bind-key -n F2 source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."
bind-key -n C-F12 set -g status
